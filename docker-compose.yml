services:
  mcp-web-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mcp-web-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3000
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"